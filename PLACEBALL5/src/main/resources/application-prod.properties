# ════════════════════════════════════════
#  PROD 프로파일 — MySQL
#  실행: java -jar placeball.jar --spring.profiles.active=prod
#  환경변수로 민감정보 주입 (절대 하드코딩 금지!)
# ════════════════════════════════════════

# MySQL 연결 (환경변수에서 읽음)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/placeball_db?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USER:placeball}
spring.datasource.password=${DB_PASSWORD:changeme}

# H2 콘솔 운영에서는 반드시 비활성화
spring.h2.console.enabled=false

# DDL: 운영에서는 절대 create-drop 금지 → validate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# JWT 시크릿 환경변수 오버라이드
jwt.secret=${JWT_SECRET}

# 로그 레벨
logging.level.com.example.CapStoneDesign=INFO
logging.level.org.springframework.security=WARN
