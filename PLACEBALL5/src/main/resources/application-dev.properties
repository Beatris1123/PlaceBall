# ════════════════════════════════════════
#  DEV 프로파일 — H2 인메모리 DB
#  실행: ./gradlew bootRun  (기본 프로파일)
# ════════════════════════════════════════

# H2 파일 기반 DB (재시작해도 데이터 유지)
spring.datasource.url=jdbc:h2:~/placeball_db;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 웹 콘솔 (http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# DDL: 처음엔 create, 이후 update
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# 로그 레벨
logging.level.com.example.CapStoneDesign=DEBUG
logging.level.org.springframework.security=DEBUG
