<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLACEBALL — 커뮤니티</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@1,900&display=swap" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;900&display=swap');
        :root { --t: #334155; --t-rgb: 51,65,85; }
        * { box-sizing: border-box; }
        body {
            font-family: 'Pretendard', sans-serif;
            background: #0a0e1a; color: #e2e8f0;
            margin: 0; padding-bottom: 90px;
        }

        .topnav {
            background: rgba(10,14,26,0.88); backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.07);
            position: sticky; top: 0; z-index: 100; padding: 0 16px;
        }
        .topnav-inner {
            max-width: 640px; margin: 0 auto;
            display: flex; align-items: center; justify-content: space-between;
            height: 56px;
        }
        .logo-text {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.3rem; font-weight: 900; letter-spacing: -0.06em;
            display: flex; align-items: baseline; cursor: pointer;
        }
        .logo-text .main { color: #f1f5f9; }
        .logo-text .sub  { color: var(--t); font-style: italic; }
        .logo-text .dot  { color: #fbbf24; }

        /* WRITE BOX */
        .write-card {
            background: #111827; border: 1px solid rgba(255,255,255,0.07);
            border-radius: 20px; padding: 18px; margin-bottom: 16px;
        }
        .write-input {
            width: 100%; height: 88px; padding: 12px 14px;
            background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px; outline: none; resize: none;
            font-family: 'Pretendard', sans-serif; font-size: 13px; font-weight: 500;
            color: #e2e8f0; transition: border-color 0.2s;
        }
        .write-input::placeholder { color: #475569; }
        .write-input:focus { border-color: rgba(var(--t-rgb),0.5); }

        .btn-post {
            width: 100%; padding: 12px; border: none; border-radius: 12px; margin-top: 10px;
            background: var(--t); color: white; font-family: 'Pretendard', sans-serif;
            font-size: 13px; font-weight: 900; cursor: pointer; transition: all 0.2s;
        }
        .btn-post:hover { filter: brightness(1.1); }

        /* POST CARD */
        .post-card {
            background: #111827; border: 1px solid rgba(255,255,255,0.07);
            border-left: 3px solid var(--t);
            border-radius: 16px; padding: 16px; margin-bottom: 10px;
            transition: all 0.2s;
        }
        .post-card:hover { border-color: rgba(var(--t-rgb),0.4); }

        .post-author {
            font-size: 11px; font-weight: 800; text-transform: uppercase;
            letter-spacing: 0.05em; color: var(--t);
        }
        .post-content {
            font-size: 14px; font-weight: 500; color: #cbd5e1;
            line-height: 1.6; margin: 8px 0;
        }
        .action-btn {
            display: flex; align-items: center; gap: 5px;
            font-size: 11px; font-weight: 700; color: #475569;
            border: none; background: transparent; cursor: pointer; transition: all 0.2s;
            padding: 4px 0;
        }
        .action-btn:hover { color: var(--t); }
        .action-btn.liked { color: #f87171; }

        /* BOTTOM NAV */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
            background: rgba(10,14,26,0.95); backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255,255,255,0.07);
            display: flex; padding-bottom: env(safe-area-inset-bottom);
        }
        .bnav-item {
            flex: 1; display: flex; flex-direction: column; align-items: center;
            justify-content: center; padding: 10px 4px 8px; gap: 4px;
            font-size: 9px; font-weight: 700; color: #475569;
            cursor: pointer; transition: all 0.2s; text-transform: uppercase;
            letter-spacing: 0.04em; border: none; background: transparent;
        }
        .bnav-item.active { color: var(--t); }
    </style>
</head>
<body>

    <header class="topnav">
        <div class="topnav-inner">
            <div class="logo-text" onclick="location.href='index.html'">
                <span class="main">PLACE</span><span class="sub">BALL</span><span class="dot">.</span>
            </div>
            <div id="auth_zone" class="flex items-center gap-2"></div>
        </div>
    </header>

    <main class="max-w-xl mx-auto p-4 mt-4">
        <!-- Section header -->
        <div class="flex items-center justify-between mb-4">
            <div>
                <h2 class="text-xl font-black text-white">팬 커뮤니티</h2>
                <p class="text-xs text-slate-500 font-medium mt-0.5">실시간 경기 이야기를 나눠보세요</p>
            </div>
            <div class="flex items-center gap-1.5 px-3 py-1.5 rounded-full text-[10px] font-black"
                 style="background:rgba(239,68,68,0.1);color:#f87171;">
                <span class="w-1.5 h-1.5 rounded-full bg-red-500 animate-pulse"></span>
                LIVE
            </div>
        </div>

        <!-- Write box -->
        <div class="write-card" id="write_box">
            <textarea id="inp" placeholder="오늘 경기에 대해 이야기해보세요! 🎙️" class="write-input"></textarea>
            <button onclick="addPost()" class="btn-post">
                글 남기기
            </button>
        </div>

        <!-- Posts -->
        <div id="posts"></div>
    </main>

    <nav class="bottom-nav">
        <button class="bnav-item" onclick="location.href='index.html'">
            <i data-lucide="radio" class="w-5 h-5"></i> 라이브
        </button>
        <button class="bnav-item" onclick="location.href='map.html'">
            <i data-lucide="map" class="w-5 h-5"></i> 지도
        </button>
        <button class="bnav-item" onclick="location.href='guide.html'">
            <i data-lucide="book-open" class="w-5 h-5"></i> 가이드
        </button>
        <button class="bnav-item" onclick="location.href='diary.html'">
            <i data-lucide="calendar-heart" class="w-5 h-5"></i> 다이어리
        </button>
        <button class="bnav-item active">
            <i data-lucide="messages-square" class="w-5 h-5"></i> 커뮤니티
        </button>
    </nav>

    <script>
    lucide.createIcons();

    const u = JSON.parse(localStorage.getItem('curr') || 'null');
    const authZone = document.getElementById('auth_zone');

    if (u) {
        document.documentElement.style.setProperty('--t', u.color);
        const r = parseInt(u.color.slice(1,3),16);
        const g = parseInt(u.color.slice(3,5),16);
        const b = parseInt(u.color.slice(5,7),16);
        document.documentElement.style.setProperty('--t-rgb', `${r},${g},${b}`);
        authZone.innerHTML = `
            <span class="text-xs font-bold text-slate-400">${u.nick}</span>
            <div class="w-8 h-8 rounded-full flex items-center justify-center text-[11px] font-black text-white"
                 style="background:${u.color}">${u.nick.charAt(0).toUpperCase()}</div>`;
    } else {
        document.getElementById('write_box').innerHTML = `
            <div class="flex flex-col items-center py-8 text-center">
                <i data-lucide="lock" class="w-8 h-8 text-slate-600 mb-3"></i>
                <p class="text-sm font-bold text-slate-500 mb-4">로그인 후 응원글을 남길 수 있습니다.</p>
                <button onclick="location.href='login.html'"
                        class="px-8 py-3 rounded-2xl font-black text-white text-sm"
                        style="background:#334155;">Login →</button>
            </div>`;
        authZone.innerHTML = `<button onclick="location.href='login.html'" class="text-xs font-bold text-slate-500 underline">로그인</button>`;
    }

    let dbPosts = JSON.parse(localStorage.getItem('community_posts') || 'null') || [
        { author:"운영자", team:"PLACEBALL", color:"#334155", content:"⚾ 오늘도 즐거운 직관 되세요! PLACEBALL과 함께해줘서 감사합니다.", likes:12, liked:false, time:"방금" },
        { author:"잠실팬", team:"LG 트윈스", color:"#C30452", content:"7회 박찬호 홈런 장난없다... 저 앞에서 봤는데 진짜 굉음ㅋㅋ", likes:8, liked:false, time:"3분 전" },
        { author:"치맥러버", team:"KIA 타이거즈", color:"#EA0029", content:"잠실원샷 치킨 대기줄 45분이라고요?? 이건 좀 심한데ㅠ 일찍 주문 ㄱ", likes:5, liked:false, time:"8분 전" },
    ];

    function renderPosts() {
        const c = document.getElementById('posts');
        c.innerHTML = '';
        dbPosts.forEach((p, i) => {
            const d = document.createElement('div');
            d.className = 'post-card';
            d.style.setProperty('border-left-color', p.color || 'var(--t)');
            d.innerHTML = `
                <div class="flex items-center gap-2 mb-2">
                    <div class="w-7 h-7 rounded-lg flex items-center justify-center text-[10px] font-black text-white shrink-0"
                         style="background:${p.color || 'var(--t)'}">
                        ${p.author.charAt(0).toUpperCase()}
                    </div>
                    <span class="post-author">${p.author}</span>
                    ${p.team ? `<span class="text-[9px] font-bold text-slate-600">· ${p.team}</span>` : ''}
                    <span class="ml-auto text-[9px] text-slate-600 font-medium">${p.time || ''}</span>
                </div>
                <p class="post-content">${p.content}</p>
                <div class="flex gap-4 pt-2 border-t border-[rgba(255,255,255,0.05)]">
                    <button onclick="toggleLike(${i})" class="action-btn ${p.liked ? 'liked' : ''}">
                        <i data-lucide="heart" class="w-3.5 h-3.5 ${p.liked ? 'fill-current' : ''}"></i>
                        <span>${p.likes}</span>
                    </button>
                </div>`;
            c.appendChild(d);
        });
        lucide.createIcons();
    }

    function addPost() {
        if (!u) { alert('로그인이 필요합니다.'); return; }
        const v = document.getElementById('inp').value.trim();
        if (!v) return;
        const now = new Date();
        dbPosts.unshift({
            author: u.nick, team: u.team, color: u.color,
            content: v, likes: 0, liked: false,
            time: `${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`
        });
        localStorage.setItem('community_posts', JSON.stringify(dbPosts));
        document.getElementById('inp').value = '';
        renderPosts();
    }

    function toggleLike(i) {
        if (!u) { alert('로그인이 필요합니다.'); return; }
        dbPosts[i].liked = !dbPosts[i].liked;
        dbPosts[i].likes += dbPosts[i].liked ? 1 : -1;
        localStorage.setItem('community_posts', JSON.stringify(dbPosts));
        renderPosts();
    }

    renderPosts();
    </script>
</body>
</html>
