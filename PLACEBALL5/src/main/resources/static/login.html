<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>PLACEBALL — Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@1,900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;900&display=swap');
        :root { --t: #334155; --t-rgb: 51,65,85; }
        * { box-sizing: border-box; }
        body {
            font-family: 'Pretendard', sans-serif;
            background: #0a0e1a; color: #e2e8f0;
            min-height: 100dvh; min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            margin: 0; padding: 20px;
            overflow: hidden; position: relative;
        }

        /* Background grid */
        body::before {
            content: '';
            position: fixed; inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
        }

        /* Glow orb */
        .glow-orb {
            position: fixed; border-radius: 50%;
            filter: blur(80px); pointer-events: none; z-index: 0;
            opacity: 0.15; transition: all 1.2s ease;
        }
        .orb1 { width: 500px; height: 500px; top: -150px; left: -100px; background: var(--t); }
        .orb2 { width: 300px; height: 300px; bottom: -80px; right: -50px; background: #fbbf24; opacity: 0.08; }

        .logo-text {
            font-family: 'Montserrat', sans-serif;
            font-size: 2rem; font-weight: 900;
            letter-spacing: -0.08em; line-height: 1;
            display: flex; align-items: baseline;
        }
        .logo-text .main { color: #f1f5f9; }
        .logo-text .sub  { color: var(--t); font-style: italic; }
        .logo-text .dot  { color: #fbbf24; }

        .card {
            position: relative; z-index: 10;
            width: 100%; max-width: 400px;
            background: rgba(17,24,39,0.8);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 28px;
            padding: 36px 32px 32px;
            box-shadow: 0 32px 64px rgba(0,0,0,0.5);
        }

        .input-field {
            width: 100%; padding: 14px 16px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px; outline: none;
            font-family: 'Pretendard', sans-serif;
            font-size: 14px; font-weight: 600;
            color: #e2e8f0; transition: all 0.2s;
        }
        .input-field::placeholder { color: #475569; }
        .input-field:focus {
            border-color: rgba(var(--t-rgb), 0.6);
            background: rgba(255,255,255,0.06);
            box-shadow: 0 0 0 3px rgba(var(--t-rgb), 0.15);
        }

        .input-wrap { position: relative; }
        .input-wrap .icon {
            position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
            color: #475569; pointer-events: none;
        }
        .input-wrap .input-field { padding-left: 42px; }

        .btn-primary {
            width: 100%; padding: 15px;
            background: var(--t); color: white;
            border: none; border-radius: 14px;
            font-family: 'Pretendard', sans-serif;
            font-size: 14px; font-weight: 900;
            cursor: pointer; transition: all 0.2s;
            box-shadow: 0 8px 24px rgba(var(--t-rgb), 0.35);
            letter-spacing: 0.02em;
        }
        .btn-primary:hover { filter: brightness(1.1); transform: translateY(-1px); }
        .btn-primary:active { transform: translateY(0); }

        .divider {
            display: flex; align-items: center; gap: 12px;
            color: #334155; font-size: 11px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.1em;
        }
        .divider::before, .divider::after {
            content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.06);
        }

        .error-msg {
            display: none; padding: 10px 14px;
            background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2);
            border-radius: 10px; color: #f87171;
            font-size: 12px; font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="glow-orb orb1" id="glowOrb"></div>
    <div class="glow-orb orb2"></div>

    <div class="card">
        <!-- Logo -->
        <div class="text-center mb-8">
            <div class="logo-text justify-center mb-3 cursor-pointer" onclick="location.href='index.html'">
                <span class="main">PLACE</span><span class="sub">BALL</span><span class="dot">.</span>
            </div>
            <p class="text-sm font-semibold text-slate-500">KBO 직관 통합 플랫폼</p>
        </div>

        <!-- Error -->
        <div class="error-msg mb-4" id="err_msg">
            <i data-lucide="alert-circle" class="w-3.5 h-3.5 inline mr-1"></i>
            <span id="err_text">이메일 또는 비밀번호가 일치하지 않습니다.</span>
        </div>

        <!-- Form -->
        <div class="space-y-3 mb-5">
            <div>
                <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2">Email</label>
                <div class="input-wrap">
                    <i data-lucide="mail" class="icon w-4 h-4"></i>
                    <input type="email" id="email" placeholder="example@mail.com" class="input-field"
                           onkeydown="if(event.key==='Enter') document.getElementById('pw').focus()">
                </div>
            </div>
            <div>
                <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2">Password</label>
                <div class="input-wrap">
                    <i data-lucide="lock" class="icon w-4 h-4"></i>
                    <input type="password" id="pw" placeholder="••••••••" class="input-field"
                           onkeydown="if(event.key==='Enter') login()">
                </div>
            </div>
        </div>

        <button onclick="login()" class="btn-primary mb-4">
            Login
        </button>

        <div class="divider mb-4">또는</div>

        <!-- Demo login -->
        <button onclick="demoLogin()" class="w-full py-3 rounded-2xl text-xs font-bold text-slate-400 border border-[rgba(255,255,255,0.07)] bg-[rgba(255,255,255,0.03)] hover:bg-[rgba(255,255,255,0.06)] transition mb-5">
            🎮 데모 계정으로 체험하기
        </button>

        <p class="text-center text-xs font-semibold text-slate-600">
            아직 회원이 아닌가요?
            <a href="signup.html" class="ml-1 font-black" style="color:var(--t);">회원가입 →</a>
        </p>
    </div>

    <script>
    lucide.createIcons();

    function login() {
        const email = document.getElementById('email').value.trim();
        const pw    = document.getElementById('pw').value;

        if (!email || !pw) {
            showErr('이메일과 비밀번호를 모두 입력해주세요.');
            return;
        }

        fetch('/api/users/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, pw })
        })
        .then(res => {
            if (res.ok) return res.json();
            throw new Error('이메일 또는 비밀번호가 일치하지 않습니다.');
        })
        .then(user => {
            localStorage.setItem('curr', JSON.stringify(user));
            location.href = 'index.html';
        })
        .catch(err => showErr(err.message));
    }

    function demoLogin() {
        // Demo user for prototype testing
        const demoTeams = [
            { nick:'야구팬', email:'demo@placeball.kr', team:'LG 트윈스', color:'#C30452' },
            { nick:'타이거즈팬', email:'demo2@placeball.kr', team:'KIA 타이거즈', color:'#EA0029' },
            { nick:'베어스팬', email:'demo3@placeball.kr', team:'두산 베어스', color:'#131230' },
        ];
        const user = demoTeams[Math.floor(Math.random() * demoTeams.length)];
        localStorage.setItem('curr', JSON.stringify(user));
        location.href = 'index.html';
    }

    function showErr(msg) {
        const el = document.getElementById('err_msg');
        document.getElementById('err_text').textContent = msg;
        el.style.display = 'block';
        setTimeout(() => { el.style.display = 'none'; }, 4000);
    }
    </script>
</body>
</html>
