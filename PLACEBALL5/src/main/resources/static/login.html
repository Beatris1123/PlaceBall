<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>PLACEBALL — Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@1,900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;900&display=swap');

        :root {
            --t:     #3b82f6;
            --t-rgb: 59,130,246;
            --bg:    #0d1526;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Pretendard', sans-serif;
            background: #f8fafc;
            color: #0f172a;
            min-height: 100dvh;
            display: flex; align-items: center; justify-content: center;
            padding: 24px 16px;
            overflow: hidden; position: relative;
        }

        /* ── 배경: 슬레이트 그라데이션 + 미세 도트 패턴 ── */
        body::before {
            content: '';
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background:
                radial-gradient(ellipse 80% 60% at 70% 0%,   rgba(var(--t-rgb),.18) 0%, transparent 60%),
                radial-gradient(ellipse 50% 40% at 0%   90%, rgba(245,158,11,.10)   0%, transparent 55%),
                /* 미세 도트 그리드 */
                radial-gradient(circle, rgba(255,255,255,.04) 1px, transparent 1px);
            background-size: auto, auto, 28px 28px;
        }

        /* ── 글로우 오브 ── */
        .glow-orb {
            position: fixed; border-radius: 50%;
            filter: blur(90px); pointer-events: none; z-index: 0;
            opacity: 0.18; transition: all 1.4s ease;
        }
        .orb1 { width: 560px; height: 560px; top: -180px; left: -120px; background: var(--t); }
        .orb2 { width: 320px; height: 320px; bottom: -80px; right: -60px; background: #f59e0b; opacity: 0.09; }

        /* ── 카드 ── */
        .card {
            position: relative; z-index: 10;
            width: 100%; max-width: 400px;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(28px) saturate(160%);
            border: 1px solid #e2e8f0;
            border-radius: 28px;
            padding: 40px 32px 36px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.12);
        }
        /* 카드 상단 팀컬러 스트라이프 */
        .card::before {
            content: '';
            position: absolute; top: 0; left: 0; right: 0; height: 3px;
            background: linear-gradient(90deg, var(--t) 0%, rgba(245,158,11,.6) 100%);
            border-radius: 28px 28px 0 0;
        }

        /* ── 로고 ── */
        .logo-text {
            font-family: 'Montserrat', sans-serif;
            font-size: 2.1rem; font-weight: 900;
            letter-spacing: -0.08em; line-height: 1;
            display: flex; align-items: baseline;
        }
        .logo-text .main { color: #0f172a; }
        .logo-text .sub  { color: var(--t); font-style: italic; }
        .logo-text .dot  { color: #f59e0b; }

        /* ── 라벨 ── */
        .field-label {
            display: block; font-size: 10px; font-weight: 900;
            text-transform: uppercase; letter-spacing: .12em;
            color: #475569; margin-bottom: 8px;
        }

        /* ── 인풋 ── */
        .input-wrap { position: relative; }
        .input-wrap .icon {
            position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
            color: #94a3b8; pointer-events: none;
        }
        .input-field {
            width: 100%; padding: 14px 16px 14px 42px;
            background: rgba(255,255,255,0.05);
            border: 1.5px solid rgba(255,255,255,0.09);
            border-radius: 14px; outline: none;
            font-family: 'Pretendard', sans-serif;
            font-size: 14px; font-weight: 600;
            color: #0f172a; transition: all 0.22s;
        }
        .input-field::placeholder { color: #334155; }
        .input-field:focus {
            border-color: rgba(var(--t-rgb), 0.6);
            background: rgba(255,255,255,0.07);
            box-shadow: 0 0 0 3px rgba(var(--t-rgb), 0.14);
        }

        /* ── 버튼 ── */
        .btn-primary {
            width: 100%; padding: 16px;
            background: var(--t); color: white;
            border: none; border-radius: 14px;
            font-family: 'Pretendard', sans-serif;
            font-size: 14px; font-weight: 900;
            cursor: pointer; transition: all 0.22s;
            box-shadow: 0 8px 28px rgba(var(--t-rgb), 0.4);
            letter-spacing: 0.02em; position: relative; overflow: hidden;
        }
        .btn-primary::after {
            content: '';
            position: absolute; top: 0; left: -100%; right: 100%; bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,.15), transparent);
            transition: all 0.5s;
        }
        .btn-primary:hover::after { left: 100%; right: -100%; }
        .btn-primary:hover { filter: brightness(1.1); transform: translateY(-1px); }
        .btn-primary:active { transform: translateY(0); filter: brightness(0.95); }

        /* ── 구분선 ── */
        .divider {
            display: flex; align-items: center; gap: 12px;
            color: #334155; font-size: 11px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.1em;
        }
        .divider::before, .divider::after {
            content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.07);
        }

        /* ── 데모 버튼 ── */
        .btn-demo {
            width: 100%; padding: 14px;
            background: rgba(255,255,255,0.04);
            border: 1.5px solid rgba(255,255,255,0.09);
            border-radius: 14px;
            font-family: 'Pretendard', sans-serif;
            font-size: 13px; font-weight: 700;
            color: #64748b; cursor: pointer;
            transition: all 0.2s;
        }
        .btn-demo:hover { background: rgba(255,255,255,0.07); color: #94a3b8; border-color: rgba(255,255,255,0.15); }

        /* ── 에러 ── */
        .error-msg {
            display: none; padding: 11px 14px;
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.22);
            border-radius: 12px; color: #fca5a5;
            font-size: 12px; font-weight: 600;
            align-items: center; gap: 8px;
        }
        .error-msg.show { display: flex; }
    </style>
</head>
<body>
    <div class="glow-orb orb1" id="glowOrb"></div>
    <div class="glow-orb orb2"></div>

    <div class="card">
        <!-- Logo -->
        <div class="text-center mb-8">
            <div class="logo-text justify-center mb-3 cursor-pointer" onclick="location.href='index.html'">
                <span class="main">PLACE</span><span class="sub">BALL</span><span class="dot">.</span>
            </div>
            <p class="text-[13px] font-semibold text-slate-500">KBO 직관 통합 플랫폼</p>
        </div>

        <!-- Error -->
        <div class="error-msg mb-4" id="err_msg">
            <i data-lucide="alert-circle" class="w-4 h-4 shrink-0"></i>
            <span id="err_text">이메일 또는 비밀번호가 일치하지 않습니다.</span>
        </div>

        <!-- Form -->
        <div class="space-y-4 mb-5">
            <div>
                <label class="field-label">Email</label>
                <div class="input-wrap">
                    <i data-lucide="mail" class="icon w-4 h-4"></i>
                    <input type="email" id="email" placeholder="example@mail.com" class="input-field"
                           onkeydown="if(event.key==='Enter') document.getElementById('pw').focus()">
                </div>
            </div>
            <div>
                <label class="field-label">Password</label>
                <div class="input-wrap">
                    <i data-lucide="lock" class="icon w-4 h-4"></i>
                    <input type="password" id="pw" placeholder="••••••••" class="input-field"
                           onkeydown="if(event.key==='Enter') login()">
                </div>
            </div>
        </div>

        <button onclick="login()" class="btn-primary mb-4">로그인</button>

        <div class="divider mb-4">또는</div>

        <!-- Demo -->
        <button onclick="demoLogin()" class="btn-demo mb-6">
            🎮 데모 계정으로 체험하기
        </button>

        <p class="text-center text-xs font-semibold text-slate-600">
            아직 회원이 아닌가요?
            <a href="signup.html" class="ml-1 font-black" style="color:var(--t);">회원가입 →</a>
        </p>
    </div>

    <script>
    lucide.createIcons();

    async function login() {
        const email    = document.getElementById('email').value.trim();
        const password = document.getElementById('pw').value;

        if (!email || !password) { showErr('이메일과 비밀번호를 모두 입력해주세요.'); return; }

        try {
            const res = await fetch('/api/users/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                // ✅ 필드명 password 로 변경 (서버 LoginRequest DTO와 일치)
                body: JSON.stringify({ email, password })
            });

            if (!res.ok) {
                const err = await res.json().catch(() => ({}));
                throw new Error(err.error || '이메일 또는 비밀번호가 일치하지 않습니다.');
            }

            // ✅ 서버가 JWT 토큰과 사용자 정보를 함께 반환
            const data = await res.json();
            // { token, email, nick, team, color }

            // JWT 토큰 저장 (API 요청 시 Authorization 헤더에 사용)
            localStorage.setItem('jwt_token', data.token);

            // 기존 curr 형식 유지 (프론트 UI 호환성)
            localStorage.setItem('curr', JSON.stringify({
                email: data.email,
                nick:  data.nick,
                team:  data.team,
                color: data.color
            }));

            location.href = 'index.html';

        } catch (err) {
            showErr(err.message);
        }
    }

    function demoLogin() {
        const demoTeams = [
            { nick:'타이거즈팬', email:'demo@placeball.kr', team:'KIA 타이거즈',  color:'#EA0029' },
            { nick:'트윈스팬',   email:'demo2@placeball.kr', team:'LG 트윈스',    color:'#C30452' },
            { nick:'이글스팬',   email:'demo3@placeball.kr', team:'한화 이글스',  color:'#FF6600' },
            { nick:'라이온즈팬', email:'demo4@placeball.kr', team:'삼성 라이온즈',color:'#074CA1' },
        ];
        const user = demoTeams[Math.floor(Math.random() * demoTeams.length)];
        localStorage.setItem('curr', JSON.stringify(user));
        location.href = 'index.html';
    }

    function showErr(msg) {
        const el = document.getElementById('err_msg');
        document.getElementById('err_text').textContent = msg;
        el.classList.add('show');
        setTimeout(() => el.classList.remove('show'), 4500);
    }

    /* 팀 컬러 적용 (이전 세션 기억) */
    const prev = JSON.parse(localStorage.getItem('curr') || 'null');
    if (prev?.color) {
        const hex = prev.color;
        const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
        document.documentElement.style.setProperty('--t', hex);
        document.documentElement.style.setProperty('--t-rgb', `${r},${g},${b}`);
        document.getElementById('glowOrb').style.background = hex;
    }
    </script>
</body>
</html>
