<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8"><title>PLACEBALL - 직관 다이어리</title>
    <script src="https://cdn.tailwindcss.com"></script><script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --t: #334155; --t-light: rgba(51, 65, 85, 0.1); } 
        body { font-family: 'Pretendard', sans-serif; background: #fffcf9; margin:0; color: #1e293b; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); border-bottom: 1px solid #e2e8f0; }
        .text-team { color: var(--t); } .bg-team { background: var(--t); }
        
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
        .day-label { @apply text-center text-[10px] font-black text-slate-400 pb-2 uppercase tracking-tighter; }
        
        .day-card { 
            aspect-ratio: 1 / 1.3; background: white; border: 1px solid #f1f5f9; 
            border-radius: 20px; padding: 12px; cursor: pointer; transition: all 0.2s;
            display: flex; flex-direction: column; gap: 4px; overflow: hidden;
        }
        .day-card:hover { transform: translateY(-4px); box-shadow: 0 12px 20px -5px rgba(0,0,0,0.05); border-color: var(--t); }
        .day-card.empty { background: transparent; border: none; cursor: default; }
        .win-gradient { background: linear-gradient(145deg, white, var(--t-light)); border: 1.5px solid var(--t) !important; }
        
        /* 잠금 화면 */
        #login-lock { display: none; }
        #login-lock.active { 
            display: flex; position: absolute; inset: 0; background: rgba(255,252,249,0.85); 
            backdrop-filter: blur(10px); z-index: 50; flex-direction: column; align-items: center; justify-content: center;
        }

        #modal { display: none; }
        #modal.open { display: flex; }
    </style>
</head>
<body class="pb-20">
    <nav class="glass sticky top-0 z-[100] px-8 py-4 flex justify-between items-center">
        <h1 class="text-2xl font-black italic tracking-tighter text-team cursor-pointer" onclick="location.href='index.html'">PLACEBALL</h1>
        <div id="auth_zone" class="flex items-center gap-4"></div>
    </nav>

    <main class="max-w-4xl mx-auto p-6 mt-6 relative min-h-[700px]">
        <div id="login-lock">
            <i data-lucide="lock" class="w-12 h-12 text-slate-300 mb-4"></i>
            <h2 class="text-2xl font-black text-slate-800 mb-2">나만의 직관 기록을 시작하세요</h2>
            <p class="text-slate-400 font-medium mb-6">로그인 후 승률 관리와 경기 메모가 가능합니다.</p>
            <button onclick="location.href='login.html'" class="px-10 py-4 bg-slate-800 text-white rounded-2xl font-bold shadow-xl">Login</button>
        </div>

        <header class="mb-10">
            <div class="flex justify-between items-end mb-6">
                <div class="flex items-center gap-6">
                    <div>
                        <h2 id="current-month-display" class="text-6xl font-black italic text-team tracking-tighter uppercase leading-none">MONTH</h2>
                        <p id="current-year-display" class="text-sm font-bold text-slate-300 ml-1">2024</p>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="changeMonth(-1)" class="p-2 bg-white rounded-full border border-slate-100 shadow-sm hover:bg-slate-50"><i data-lucide="chevron-left"></i></button>
                        <button onclick="changeMonth(1)" class="p-2 bg-white rounded-full border border-slate-100 shadow-sm hover:bg-slate-50"><i data-lucide="chevron-right"></i></button>
                    </div>
                </div>
                <div class="text-right">
                    <p class="text-[10px] font-black text-slate-400 mb-1 uppercase tracking-widest">Win Rate</p>
                    <span id="win-rate-text" class="text-3xl font-black text-team">0%</span>
                </div>
            </div>
            <div class="w-full h-2 bg-slate-100 rounded-full overflow-hidden">
                <div id="win-progress" class="h-full bg-team w-0 transition-all duration-1000"></div>
            </div>
        </header>

        <div class="calendar-grid mb-2">
            <div class="day-label">Sun</div><div class="day-label">Mon</div><div class="day-label">Tue</div>
            <div class="day-label">Wed</div><div class="day-label">Thu</div><div class="day-label">Fri</div><div class="day-label">Sat</div>
        </div>
        <div class="calendar-grid" id="calendar"></div>
    </main>

    <div id="modal" class="fixed inset-0 bg-black/60 z-[200] items-center justify-center p-4 backdrop-blur-md">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-8 shadow-2xl">
            <div class="flex justify-between items-start mb-6">
                <h3 id="modal-date-title" class="text-3xl font-black text-team italic">DATE</h3>
                <button onclick="closeModal()"><i data-lucide="x" class="text-slate-300"></i></button>
            </div>
            <div class="space-y-5">
                <div class="flex gap-2">
                    <button onclick="setResult('W')" id="btn-w" class="flex-1 py-4 rounded-2xl border-2 font-black transition-all">WIN ❤️</button>
                    <button onclick="setResult('L')" id="btn-l" class="flex-1 py-4 rounded-2xl border-2 font-black transition-all">LOSE X</button>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <input type="text" id="opp-team" placeholder="상대팀" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold text-sm">
                    <input type="text" id="seat" placeholder="좌석번호" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold text-sm">
                </div>
                <textarea id="memo" placeholder="오늘 경기의 한 줄 평을 남겨주세요." class="w-full h-28 p-4 bg-slate-50 rounded-2xl outline-none resize-none font-medium text-sm"></textarea>
            </div>
            <button onclick="saveRecord()" class="w-full bg-team text-white py-5 rounded-[1.5rem] font-black shadow-xl mt-8 hover:brightness-110 transition-all">기록 저장</button>
        </div>
    </div>

    <script>
        const u = JSON.parse(localStorage.getItem('curr'));
        const authZone = document.getElementById('auth_zone');

        // 로그인 여부에 따른 초기화
        if (u) {
            document.documentElement.style.setProperty('--t', u.color);
            document.documentElement.style.setProperty('--t-light', u.color + '15');
            authZone.innerHTML = `<span class="text-xs font-bold text-slate-600">${u.nick}님 기록중</span>`;
        } else {
            document.getElementById('login-lock').classList.add('active');
            authZone.innerHTML = `<button onclick="location.href='login.html'" class="text-xs font-bold text-slate-400 underline">Login 필요</button>`;
        }

        let currDate = new Date();
        let selectedDayKey = null;
        let selectedResult = null;
        let records = u ? (JSON.parse(localStorage.getItem(`diary_${u.email}`)) || {}) : {};

        const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];

        function renderCalendar() {
            const year = currDate.getFullYear();
            const month = currDate.getMonth();
            document.getElementById('current-month-display').innerText = monthNames[month];
            document.getElementById('current-year-display').innerText = year;

            const firstDay = new Date(year, month, 1).getDay();
            const lastDate = new Date(year, month + 1, 0).getDate();
            const cal = document.getElementById('calendar');
            cal.innerHTML = '';

            for (let i = 0; i < firstDay; i++) {
                const empty = document.createElement('div');
                empty.className = 'day-card empty';
                cal.appendChild(empty);
            }

            let total = 0, wins = 0;
            for (let d = 1; d <= lastDate; d++) {
                const dateKey = `${year}-${month + 1}-${d}`;
                const data = records[dateKey];
                
                const card = document.createElement('div');
                card.className = 'day-card';
                if(data && data.res === 'W') { card.classList.add('win-gradient'); wins++; total++; }
                else if(data && data.res === 'L') { total++; }

                card.onclick = () => u ? openModal(d, dateKey) : location.href='login.html';
                
                // 달력 칸 내부 구성: 날짜 + 요약 + 메모(코멘트)
                card.innerHTML = `
                    <span class="text-[11px] font-black ${data ? 'text-team' : 'text-slate-300'}">${d}</span>
                    <div class="flex flex-col gap-1 overflow-hidden">
                        ${data ? `
                            <p class="text-[10px] font-black truncate ${data.res === 'W' ? 'text-team' : 'text-slate-500'}">vs ${data.opp}</p>
                            <p class="text-[9px] text-slate-400 font-medium leading-tight line-clamp-2">${data.memo || '기록 없음'}</p>
                        ` : ''}
                    </div>
                `;
                cal.appendChild(card);
            }

            const rate = total === 0 ? 0 : Math.round((wins / total) * 100);
            document.getElementById('win-rate-text').innerText = `${rate}%`;
            document.getElementById('win-progress').style.width = `${rate}%`;
            lucide.createIcons();
        }

        function changeMonth(diff) {
            currDate.setMonth(currDate.getMonth() + diff);
            renderCalendar();
        }

        function openModal(day, key) {
            selectedDayKey = key;
            document.getElementById('modal-date-title').innerText = `${monthNames[currDate.getMonth()]} ${day}`;
            const data = records[key] || {opp:'', seat:'', memo:'', res:null};
            
            document.getElementById('opp-team').value = data.opp;
            document.getElementById('seat').value = data.seat;
            document.getElementById('memo').value = data.memo;
            setResult(data.res);
            
            document.getElementById('modal').classList.add('open');
        }

        function setResult(res) {
            selectedResult = res;
            const bw = document.getElementById('btn-w'), bl = document.getElementById('btn-l');
            bw.style.backgroundColor = res === 'W' ? 'var(--t-light)' : 'transparent';
            bw.style.borderColor = res === 'W' ? 'var(--t)' : '#f1f5f9';
            bw.style.color = res === 'W' ? 'var(--t)' : '#cbd5e1';
            bl.style.backgroundColor = res === 'L' ? '#1e293b' : 'transparent';
            bl.style.borderColor = res === 'L' ? '#1e293b' : '#f1f5f9';
            bl.style.color = res === 'L' ? '#fff' : '#cbd5e1';
        }

        function saveRecord() {
            if(!u) return;
            records[selectedDayKey] = {
                opp: document.getElementById('opp-team').value,
                seat: document.getElementById('seat').value,
                memo: document.getElementById('memo').value,
                res: selectedResult
            };
            localStorage.setItem(`diary_${u.email}`, JSON.stringify(records));
            closeModal(); 
            renderCalendar();
        }

        function closeModal() { document.getElementById('modal').classList.remove('open'); }

        renderCalendar();
    </script>
</body>
</html>
