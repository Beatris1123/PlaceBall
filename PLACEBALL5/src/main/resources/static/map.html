<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PLACEBALL — Stadium Map</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@1,900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;900&display=swap');

        :root {
            --t: #2563eb;
            --t-rgb: 37,99,235;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Pretendard', sans-serif;
            background: #f1f5f9; color: #0f172a;
            overflow: hidden; height: 100dvh; height: 100vh;
            display: flex; flex-direction: column;
            -webkit-tap-highlight-color: transparent;
        }

        /* ─── LOGO ─── */
        .logo-text {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.3rem; font-weight: 900;
            letter-spacing: -0.06em; line-height: 1;
            display: flex; align-items: baseline;
        }
        .logo-text .main { color: #0f172a; }
        .logo-text .sub  { color: var(--t); font-style: italic; }
        .logo-text .dot  { color: #f59e0b; }

        /* ─── TOP BAR ─── */
        .topbar {
            background: rgba(255,255,255,0.97);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid #e2e8f0;
            z-index: 200; flex-shrink: 0;
        }

        /* ─── STADIUM PILLS ─── */
        .stadium-scroll {
            display: flex; gap: 6px; overflow-x: auto;
            padding: 8px 16px; scrollbar-width: none;
        }
        .stadium-scroll::-webkit-scrollbar { display: none; }

        .stadium-pill {
            flex-shrink: 0; padding: 6px 14px;
            border-radius: 99px; font-size: 11px; font-weight: 700;
            background: #f8fafc; color: #64748b;
            border: 1.5px solid #e2e8f0; cursor: pointer;
            transition: all 0.2s; white-space: nowrap;
        }
        .stadium-pill.active {
            background: var(--t); color: white; border-color: transparent;
            box-shadow: 0 4px 12px rgba(var(--t-rgb), 0.35);
        }
        .stadium-pill:hover:not(.active) { border-color: #cbd5e1; background: #f1f5f9; }

        /* ─── CATEGORY TABS ─── */
        .cat-bar {
            display: flex; gap: 6px; padding: 6px 16px 10px;
            overflow-x: auto; scrollbar-width: none; flex-shrink: 0;
        }
        .cat-bar::-webkit-scrollbar { display: none; }

        .cat-btn {
            flex-shrink: 0; display: flex; align-items: center; gap: 5px;
            padding: 7px 13px; border-radius: 10px; font-size: 11px; font-weight: 700;
            border: 1.5px solid #e2e8f0; background: #f8fafc;
            color: #64748b; cursor: pointer; transition: all 0.2s;
        }
        .cat-btn.active-FOOD   { background: #fff7ed; color: #ea580c; border-color: #fdba74; }
        .cat-btn.active-STORE  { background: #f0fdf4; color: #16a34a; border-color: #86efac; }
        .cat-btn.active-BATH   { background: #eff6ff; color: #2563eb; border-color: #93c5fd; }
        .cat-btn.active-GOODS  { background: rgba(var(--t-rgb),0.08); color: var(--t); border-color: rgba(var(--t-rgb),0.3); }

        /* ─── QUICK INFO TOGGLE ─── */
        #quick_toggle {
            flex-shrink: 0; display: flex; align-items: center; gap: 5px;
            padding: 7px 13px; border-radius: 10px; font-size: 11px; font-weight: 700;
            border: 1.5px solid #e2e8f0; background: #f8fafc;
            color: #64748b; cursor: pointer; transition: all 0.2s; margin-left: auto;
        }
        #quick_toggle.open {
            background: rgba(var(--t-rgb),0.08); color: var(--t);
            border-color: rgba(var(--t-rgb),0.3);
        }

        /* ─── MAP ─── */
        #map_wrap { flex: 1; position: relative; overflow: hidden; }
        #map { width: 100%; height: 100%; z-index: 1; }

        .leaflet-container { font-family: 'Pretendard', sans-serif; }
        .leaflet-control-zoom a { border-radius: 8px !important; font-weight: 900 !important; }

        /* ─── FAB BUTTONS ─── */
        .fab {
            position: absolute; right: 14px;
            width: 46px; height: 46px; border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.2s; z-index: 50; border: none;
        }
        .fab:active { transform: scale(0.95); }
        #fab_locate {
            bottom: 330px; background: #ffffff;
            border: 1.5px solid #e2e8f0; color: #64748b;
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
        }
        #fab_locate:hover { background: #f8fafc; }
        #fab_nav {
            bottom: 274px; background: var(--t); color: white;
            box-shadow: 0 4px 16px rgba(var(--t-rgb),0.35);
        }

        /* ─── QUICK INFO PANEL ─── */
        #quick_panel {
            position: absolute; top: 0; left: 0; right: 0; z-index: 120;
            background: #ffffff;
            border-bottom: 1px solid #e2e8f0;
            transform: translateY(-100%);
            transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
            max-height: 55vh; overflow-y: auto;
            box-shadow: 0 6px 24px rgba(0,0,0,0.1);
        }
        #quick_panel.open { transform: translateY(0); }

        /* ─── BOTTOM SHEET ─── */
        #bottom_sheet {
            position: absolute; bottom: 0; left: 0; right: 0; z-index: 150;
            background: #ffffff;
            border-radius: 22px 22px 0 0;
            border-top: 1px solid #e2e8f0;
            transform: translateY(100%);
            transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
            max-height: 65vh; overflow-y: auto;
            box-shadow: 0 -6px 32px rgba(0,0,0,0.1);
        }
        #bottom_sheet.open { transform: translateY(0); }

        .sheet-handle {
            width: 38px; height: 4px; background: #cbd5e1;
            border-radius: 99px; margin: 10px auto 0;
        }

        /* Crowd */
        .crowd-bar { height: 8px; background: #e2e8f0; border-radius: 99px; overflow: hidden; margin-top: 6px; }
        .crowd-fill { height: 100%; border-radius: 99px; transition: width 0.8s ease; }

        /* Vote buttons */
        .vote-btn {
            flex: 1; padding: 8px 0; border-radius: 10px;
            font-size: 11px; font-weight: 800; cursor: pointer;
            border: 1.5px solid #e2e8f0; background: #f8fafc;
            color: #64748b; transition: all 0.2s;
        }
        .vote-btn:hover { background: #f1f5f9; }
        .vote-btn.voted-low  { background: #f0fdf4; color: #16a34a; border-color: #86efac; }
        .vote-btn.voted-mid  { background: #fffbeb; color: #d97706; border-color: #fcd34d; }
        .vote-btn.voted-high { background: #fef2f2; color: #dc2626; border-color: #fca5a5; }

        /* ─── CUSTOM MARKERS ─── */
        .mk {
            width: 30px; height: 30px; border-radius: 50% 50% 50% 0;
            transform: rotate(-45deg);
            display: flex; align-items: center; justify-content: center;
            border: 2px solid white;
            box-shadow: 0 3px 10px rgba(0,0,0,0.25);
            cursor: pointer; transition: transform 0.2s;
        }
        .mk:hover { transform: rotate(-45deg) scale(1.2); }
        .mk-inner { transform: rotate(45deg); font-size: 11px; font-weight: 900; color: white; }
        .mk-FOOD  { background: #ea580c; }
        .mk-STORE { background: #16a34a; }
        .mk-BATH  { background: #2563eb; }
        .mk-GOODS { background: var(--t); }

        /* ─── NAV CTA ─── */
        .nav-cta {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            padding: 13px; border-radius: 13px; font-size: 13px; font-weight: 900;
            cursor: pointer; transition: all 0.2s; border: none;
            background: var(--t); color: white;
            box-shadow: 0 4px 16px rgba(var(--t-rgb),0.3);
        }
        .nav-cta:active { transform: scale(0.98); }
        .nav-cta.secondary {
            background: #f1f5f9; border: 1.5px solid #e2e8f0; color: #64748b;
            box-shadow: none;
        }

        /* ─── LEGEND ─── */
        .legend-dot { width: 9px; height: 9px; border-radius: 50%; }

        /* ─── BOTTOM NAV ─── */
        .bottom-nav {
            background: rgba(255,255,255,0.97); backdrop-filter: blur(20px);
            border-top: 1px solid #e2e8f0;
            display: flex; flex-shrink: 0;
            padding-bottom: env(safe-area-inset-bottom);
        }
        .bnav-item {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 10px 4px 8px; gap: 4px;
            font-size: 9px; font-weight: 700; color: #94a3b8;
            cursor: pointer; transition: all 0.2s;
            text-transform: uppercase; letter-spacing: 0.04em;
            border: none; background: transparent;
        }
        .bnav-item.active { color: var(--t); }
        .bnav-item:active { opacity: 0.6; }

        /* No data hint */
        .no-data-hint {
            position: absolute; top: 50%; left: 50%; z-index: 10;
            transform: translate(-50%, -50%);
            background: rgba(255,255,255,0.95);
            border: 1px solid #e2e8f0;
            border-radius: 16px; padding: 16px 24px;
            text-align: center; font-size: 13px; font-weight: 700;
            color: #64748b; pointer-events: none;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
        }

        /* ─── QUICK INFO CARDS ─── */
        .qi-card {
            background: #f8fafc; border: 1px solid #e2e8f0;
            border-radius: 14px; padding: 12px 14px;
            display: flex; align-items: center; gap: 10px;
        }
        .qi-icon {
            width: 40px; height: 40px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; flex-shrink: 0;
        }

        /* Weather card special */
        .weather-card {
            background: linear-gradient(135deg, rgba(var(--t-rgb),0.08) 0%, rgba(var(--t-rgb),0.04) 100%);
            border: 1.5px solid rgba(var(--t-rgb),0.15);
            border-radius: 16px; padding: 14px 16px;
        }
        .weather-big-icon { font-size: 36px; line-height: 1; }

        /* Status badge */
        .status-badge {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 3px 8px; border-radius: 99px;
            font-size: 10px; font-weight: 800;
        }
        .badge-green  { background: #f0fdf4; color: #16a34a; }
        .badge-yellow { background: #fffbeb; color: #d97706; }
        .badge-red    { background: #fef2f2; color: #dc2626; }
        .badge-blue   { background: #eff6ff; color: #2563eb; }

        /* ─── FOOTER ─── */
        .site-footer {
            background: #1e293b; color: #94a3b8;
            padding: 20px 20px 16px; flex-shrink: 0;
            display: none; /* map은 스크롤 없어서 숨김; 다른 페이지에서만 표시 */
        }
    </style>
</head>
<body>

    <!-- ══ TOP BAR ══ -->
    <header class="topbar">
        <div class="flex items-center justify-between px-4 py-2.5">
            <div onclick="location.href='index.html'" class="logo-text cursor-pointer">
                <span class="main">PLACE</span><span class="sub">BALL</span><span class="dot">.</span>
            </div>
            <div class="flex items-center gap-2">
                <button onclick="navToStadium()" class="flex items-center gap-1.5 px-3 py-1.5 rounded-xl text-xs font-bold"
                        style="background: rgba(var(--t-rgb),0.1); color: var(--t); border: 1.5px solid rgba(var(--t-rgb),0.2);">
                    <i data-lucide="navigation" class="w-3.5 h-3.5"></i>
                    <span>구장 길찾기</span>
                </button>
                <div id="u_circle" class="w-8 h-8 rounded-full flex items-center justify-center text-[11px] font-black text-white"
                     style="background: #94a3b8;">?</div>
            </div>
        </div>

        <!-- Stadium pills -->
        <div class="stadium-scroll">
            <button id="pill-jamsil"   onclick="changeStadium('jamsil')"   class="stadium-pill active">잠실</button>
            <button id="pill-gocheok"  onclick="changeStadium('gocheok')"  class="stadium-pill">고척 스카이돔</button>
            <button id="pill-incheon"  onclick="changeStadium('incheon')"  class="stadium-pill">SSG 랜더스필드</button>
            <button id="pill-suwon"    onclick="changeStadium('suwon')"    class="stadium-pill">수원 KT 위즈파크</button>
            <button id="pill-gwangju"  onclick="changeStadium('gwangju')"  class="stadium-pill">광주 챔피언스필드</button>
            <button id="pill-daegu"    onclick="changeStadium('daegu')"    class="stadium-pill">대구 라이온즈파크</button>
            <button id="pill-sajik"    onclick="changeStadium('sajik')"    class="stadium-pill">사직 야구장</button>
            <button id="pill-changwon" onclick="changeStadium('changwon')" class="stadium-pill">창원 NC파크</button>
            <button id="pill-daejeon"  onclick="changeStadium('daejeon')"  class="stadium-pill">대전 이글스파크</button>
        </div>

        <!-- Category tabs + Quick Info toggle -->
        <div class="cat-bar">
            <button id="cat-FOOD"  onclick="setCategory('FOOD')"  class="cat-btn">
                <i data-lucide="utensils" class="w-3.5 h-3.5"></i> 음식점
            </button>
            <button id="cat-STORE" onclick="setCategory('STORE')" class="cat-btn">
                <i data-lucide="store" class="w-3.5 h-3.5"></i> 편의점
            </button>
            <button id="cat-BATH"  onclick="setCategory('BATH')"  class="cat-btn">
                <i data-lucide="droplets" class="w-3.5 h-3.5"></i> 화장실
            </button>
            <button id="cat-GOODS" onclick="setCategory('GOODS')" class="cat-btn">
                <i data-lucide="shopping-bag" class="w-3.5 h-3.5"></i> 팀 스토어
            </button>
            <!-- Quick Info Toggle -->
            <button id="quick_toggle" onclick="toggleQuickPanel()">
                <i data-lucide="info" class="w-3.5 h-3.5"></i> QUICK INFO
            </button>
        </div>
    </header>

    <!-- ══ MAP WRAP ══ -->
    <div id="map_wrap">
        <div id="map"></div>

        <!-- ══ QUICK INFO PANEL (슬라이드 다운) ══ -->
        <div id="quick_panel">
            <div class="px-4 py-4">
                <!-- Panel header -->
                <div class="flex items-center justify-between mb-3">
                    <h3 id="qi_title" class="text-sm font-black text-slate-800">잠실 야구장 — 빠른 정보</h3>
                    <button onclick="closeQuickPanel()" class="w-7 h-7 rounded-full bg-slate-100 flex items-center justify-center hover:bg-slate-200 transition">
                        <i data-lucide="x" class="w-3.5 h-3.5 text-slate-500"></i>
                    </button>
                </div>

                <!-- ① 날씨 카드 -->
                <div class="weather-card mb-3" id="weather_card">
                    <div class="flex items-center justify-between">
                        <div class="flex items-center gap-3">
                            <div class="weather-big-icon" id="w_icon">⏳</div>
                            <div>
                                <p class="text-[11px] font-bold text-slate-400 mb-0.5">현재 구장 날씨</p>
                                <p class="text-xl font-black text-slate-800" id="w_temp">--°C</p>
                                <p class="text-xs font-semibold text-slate-500" id="w_desc">불러오는 중...</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <div class="flex flex-col gap-1 items-end">
                                <div class="flex items-center gap-1.5 text-[11px] text-slate-500 font-medium">
                                    <i data-lucide="wind" class="w-3 h-3"></i>
                                    <span id="w_wind">-- m/s</span>
                                </div>
                                <div class="flex items-center gap-1.5 text-[11px] text-slate-500 font-medium">
                                    <i data-lucide="droplets" class="w-3 h-3"></i>
                                    <span id="w_humidity">--%</span>
                                </div>
                            </div>
                            <p id="w_mock_badge" class="text-[9px] text-slate-300 font-medium mt-2" style="display:none;">※ 목업 데이터</p>
                        </div>
                    </div>
                </div>

                <!-- ② 구장 정보 그리드 -->
                <div class="grid grid-cols-2 gap-2.5 mb-3">
                    <!-- 운영 상태 -->
                    <div class="qi-card flex-col items-start gap-1.5">
                        <div class="flex items-center gap-2 w-full">
                            <div class="qi-icon" style="background:#f0fdf4;">🏟️</div>
                            <div>
                                <p class="text-[10px] font-bold text-slate-400">운영 상태</p>
                                <p id="qi_status" class="text-xs font-black text-slate-800">--</p>
                            </div>
                        </div>
                    </div>
                    <!-- 홈팀 -->
                    <div class="qi-card flex-col items-start gap-1.5">
                        <div class="flex items-center gap-2 w-full">
                            <div class="qi-icon" style="background:#eff6ff;">⚾</div>
                            <div>
                                <p class="text-[10px] font-bold text-slate-400">홈팀</p>
                                <p id="qi_team" class="text-xs font-black text-slate-800">--</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- ③ 주차장 현황 (목업) -->
                <div class="qi-card mb-2.5">
                    <div class="qi-icon" style="background:#fefce8;">🅿️</div>
                    <div class="flex-1 min-w-0">
                        <div class="flex items-center justify-between mb-1">
                            <p class="text-[10px] font-bold text-slate-400">주차장 현황</p>
                            <span id="qi_park_badge" class="status-badge badge-green">여유</span>
                        </div>
                        <div class="w-full h-1.5 bg-slate-200 rounded-full overflow-hidden">
                            <div id="qi_park_bar" class="h-full rounded-full bg-green-400 transition-all" style="width:25%"></div>
                        </div>
                        <p id="qi_park_text" class="text-[10px] text-slate-400 font-medium mt-1">예상 잔여 <strong class="text-slate-600" id="qi_park_remain">--</strong> 면 (목업)</p>
                    </div>
                </div>

                <!-- ④ 최단 게이트 (목업) -->
                <div class="qi-card mb-2.5">
                    <div class="qi-icon" style="background:#fdf4ff;">🚪</div>
                    <div class="flex-1">
                        <p class="text-[10px] font-bold text-slate-400 mb-0.5">최단 게이트</p>
                        <p id="qi_gate" class="text-xs font-black text-slate-800">--</p>
                        <p class="text-[10px] text-slate-400 font-medium mt-0.5" id="qi_gate_sub">--</p>
                    </div>
                </div>

                <!-- ⑤ 오늘 경기 -->
                <div class="qi-card">
                    <div class="qi-icon" style="background:#fff7ed;">📅</div>
                    <div class="flex-1">
                        <p class="text-[10px] font-bold text-slate-400 mb-0.5">오늘의 경기</p>
                        <p id="qi_game" class="text-xs font-black text-slate-800">--</p>
                        <p id="qi_game_sub" class="text-[10px] text-slate-400 font-medium mt-0.5">--</p>
                    </div>
                </div>

                <p class="text-[9px] text-slate-300 font-medium text-center mt-3">
                    날씨: 기상청 단기예보 API | 주차·게이트: 목업 데이터
                </p>
            </div>
        </div>

        <!-- FAB -->
        <button class="fab" id="fab_locate" onclick="locateMe()">
            <i data-lucide="locate" class="w-5 h-5"></i>
        </button>
        <button class="fab" id="fab_nav" onclick="navToStadium()">
            <i data-lucide="navigation-2" class="w-5 h-5"></i>
        </button>

        <!-- No data hint -->
        <div id="no_data" class="no-data-hint" style="display:none;">
            📍 해당 구장의 시설 정보를 준비 중입니다
        </div>

        <!-- Bottom Sheet -->
        <div id="bottom_sheet">
            <div class="sheet-handle"></div>
            <div class="px-5 pt-3 pb-6">

                <!-- Header -->
                <div class="flex items-start justify-between mb-4">
                    <div class="flex items-center gap-3">
                        <div id="bs_cat_icon" class="w-10 h-10 rounded-xl flex items-center justify-center shrink-0"
                             style="background: #fff7ed;">
                            <i data-lucide="utensils" class="w-5 h-5 text-orange-500"></i>
                        </div>
                        <div>
                            <h3 id="bs_name" class="text-lg font-black text-slate-800">시설 이름</h3>
                            <p id="bs_cat_label" class="text-xs font-semibold text-slate-400">카테고리</p>
                        </div>
                    </div>
                    <button onclick="closeSheet()" class="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center hover:bg-slate-200 transition">
                        <i data-lucide="x" class="w-4 h-4 text-slate-500"></i>
                    </button>
                </div>

                <!-- Location -->
                <div class="flex items-start gap-2 mb-4 p-3 rounded-xl bg-slate-50 border border-slate-200">
                    <i data-lucide="map-pin" class="w-4 h-4 text-slate-400 mt-0.5 shrink-0"></i>
                    <p id="bs_loc" class="text-xs text-slate-600 leading-relaxed font-medium">위치 정보를 불러오는 중...</p>
                </div>

                <!-- Crowd meter -->

function updateQuickInfo(stadiumId) {
    const qi = quickInfoData[stadiumId];
    if (!qi) return;

    // 제목
    document.getElementById('qi_title').textContent = `${qi.name} — 빠른 정보`;

    // 운영 상태
    const statusEl = document.getElementById('qi_status');
    statusEl.textContent = qi.status;
    statusEl.className = `text-xs font-black ${qi.statusType === 'green' ? 'text-green-600' : 'text-red-500'}`;

    // 홈팀
    document.getElementById('qi_team').textContent = qi.teams;

    // 주차장
    const park = qi.park;
    const pct = Math.round((1 - park.remain / park.total) * 100);
    document.getElementById('qi_park_bar').style.width = pct + '%';
    document.getElementById('qi_park_bar').className = `h-full rounded-full transition-all ${
        park.status === 'green' ? 'bg-green-400' : park.status === 'yellow' ? 'bg-amber-400' : 'bg-red-400'
    }`;
    document.getElementById('qi_park_badge').textContent = park.label;
    document.getElementById('qi_park_badge').className = `status-badge badge-${park.status}`;
    document.getElementById('qi_park_remain').textContent = park.remain;

    // 최단 게이트
    document.getElementById('qi_gate').textContent = qi.gate;
    document.getElementById('qi_gate_sub').textContent = qi.gateSub;

    // 오늘 경기
    document.getElementById('qi_game').textContent = qi.todayGame;
    document.getElementById('qi_game_sub').textContent = qi.todayGameSub;

    // 날씨 로드
    loadWeather(stadiumId);
}

/* ── 날씨 API 호출 ── */
async function loadWeather(stadiumId) {
    const iconEl    = document.getElementById('w_icon');
    const tempEl    = document.getElementById('w_temp');
    const descEl    = document.getElementById('w_desc');
    const windEl    = document.getElementById('w_wind');
    const humidEl   = document.getElementById('w_humidity');
    const mockBadge = document.getElementById('w_mock_badge');

    iconEl.textContent = '⏳';
    tempEl.textContent = '--°C';
    descEl.textContent = '날씨 불러오는 중...';

    try {
        const res = await fetch(`/api/weather?stadiumId=${stadiumId}`);
        if (!res.ok) throw new Error('API 오류');
        const data = await res.json();

        iconEl.textContent    = data.icon;
        tempEl.textContent    = data.temp;
        descEl.textContent    = data.desc;
        windEl.textContent    = data.wind;
        humidEl.textContent   = data.humidity;
        mockBadge.style.display = data.mock ? 'block' : 'none';
    } catch(e) {
        iconEl.textContent  = '🌤️';
        tempEl.textContent  = '--°C';
        descEl.textContent  = '날씨 정보 없음';
        windEl.textContent  = '--';
        humidEl.textContent = '--';
    }
    lucide.createIcons();
}

    clearMarkers();

    if (quickPanelOpen) {

function setCategory(cat) {
    currentCategory = cat;
    document.querySelectorAll('.cat-btn').forEach(b => {
        b.className = b.className.replace(/\s*active-\w+/g, '').trim();
    });
    document.getElementById('cat-' + cat)?.classList.add('active-' + cat);
    clearMarkers();
    renderMarkers();
    closeSheet();
}

/* ── MARKERS ── */
function clearMarkers() {
    activeMarkers.forEach(m => map.removeLayer(m));
    activeMarkers = [];
}

function renderMarkers() {
    const list = (facilityData[currentStadiumId] || []).filter(f => f.cat === currentCategory);

    const noData = document.getElementById('no_data');
    noData.style.display = list.length === 0 ? 'block' : 'none';

    list.forEach(f => {
        const el = document.createElement('div');
        el.className = `mk mk-${f.cat}`;
        el.innerHTML = `<span class="mk-inner">${f.name.charAt(0)}</span>`;

        const icon = L.divIcon({
            html: el.outerHTML,
            className: '',
            iconSize: [30, 30],
            iconAnchor: [15, 30]
        });

        const marker = L.marker([f.lat, f.lng], { icon })
            .addTo(map)
            .on('click', (e) => { e.originalEvent.stopPropagation(); openSheet(f); });
        activeMarkers.push(marker);
    });
}

/* ── BOTTOM SHEET ── */
function openSheet(f) {
    closeQuickPanel();
    selectedFacility = f;
    const meta = catMeta[f.cat];

    document.getElementById('bs_name').textContent = f.name;
    document.getElementById('bs_cat_label').textContent = meta.label;
    document.getElementById('bs_loc').textContent = f.loc || '위치 정보 없음';

    const iconWrap = document.getElementById('bs_cat_icon');
    const teamColor = getComputedStyle(document.documentElement).getPropertyValue('--t').trim();
    const goodsBg = `rgba(${getComputedStyle(document.documentElement).getPropertyValue('--t-rgb').trim()},0.1)`;
    iconWrap.style.background = f.cat === 'GOODS' ? goodsBg : meta.bg;
    iconWrap.innerHTML = `<i data-lucide="${meta.icon}" class="w-5 h-5 ${meta.colorClass}" ${f.cat === 'GOODS' ? `style="color:${teamColor}"` : ''}></i>`;

    updateCrowdUI(f.crowd);
    ['low','mid','high'].forEach(v => { document.getElementById('vbtn-' + v).className = 'vote-btn'; });
    const saved = voteState[f.name];
    if (saved) document.getElementById('vbtn-' + saved)?.classList.add('voted-' + saved);

    document.getElementById('bottom_sheet').classList.add('open');
    lucide.createIcons();
}

function closeSheet() {
    document.getElementById('bottom_sheet').classList.remove('open');
    selectedFacility = null;
}

function updateCrowdUI(pct) {
    const bar   = document.getElementById('bs_crowd_bar');
    const label = document.getElementById('bs_crowd_label');
    bar.style.width = pct + '%';
    if (pct < 40) {
        bar.className = 'crowd-fill bg-green-400';
        label.textContent = '여유 (' + pct + '%)';
        label.className   = 'text-xs font-black text-green-600';
    } else if (pct < 70) {
        bar.className = 'crowd-fill bg-amber-400';
        label.textContent = '보통 (' + pct + '%)';
        label.className   = 'text-xs font-black text-amber-500';
    } else {
        bar.className = 'crowd-fill bg-red-400';
        label.textContent = '혼잡 (' + pct + '%)';
        label.className   = 'text-xs font-black text-red-500';
    }
}

function vote(level) {
    if (!selectedFacility) return;
    voteState[selectedFacility.name] = level;
    ['low','mid','high'].forEach(v => { document.getElementById('vbtn-' + v).className = 'vote-btn'; });
    document.getElementById('vbtn-' + level)?.classList.add('voted-' + level);
    const pctMap = { low: 25, mid: 55, high: 85 };
    selectedFacility.crowd = pctMap[level];
    updateCrowdUI(pctMap[level]);
}

/* ── NAVIGATION ── */
function navToSelected() {
    if (!selectedFacility) { navToStadium(); return; }
    const { name, lat, lng } = selectedFacility;
    window.open(`https://map.kakao.com/link/to/${encodeURIComponent(name)},${lat},${lng}`, '_blank');
}

function navToStadium() {
    const c = stadiumCoords[currentStadiumId];
    const name = stadiumNames[currentStadiumId];
    window.open(`https://map.kakao.com/link/to/${encodeURIComponent(name)},${c[0]},${c[1]}`, '_blank');
}

function locateMe() {
    if (!navigator.geolocation) { alert('위치 서비스를 지원하지 않습니다.'); return; }
    navigator.geolocation.getCurrentPosition(pos => {
        const { latitude: lat, longitude: lng } = pos.coords;
        map.panTo([lat, lng]);
        const el = document.createElement('div');
        el.style.cssText = `
            width:16px; height:16px; border-radius:50%;
            background:var(--t); border:3px solid white;
            box-shadow:0 0 0 4px rgba(var(--t-rgb),0.25);
        `;
        L.marker([lat, lng], {
            icon: L.divIcon({ html: el.outerHTML, className: '', iconSize:[16,16], iconAnchor:[8,8] })
        }).addTo(map);
    }, () => alert('위치 정보를 가져올 수 없습니다.'));
}
</script>
