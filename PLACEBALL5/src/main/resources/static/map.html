<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PLACEBALL — Stadium Map</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=a6b54298c1ed0eb5de93147ba633a285"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@1,900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;900&display=swap');

        :root {
            --t: #334155;
            --t-rgb: 51, 65, 85;
            --bg: #0d1526;
            --card: rgba(13,21,38,0.96);
            --border: rgba(255,255,255,0.09);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Pretendard', sans-serif;
            background: var(--bg); color: #f8fafc;
            overflow: hidden; height: 100dvh; height: 100vh;
            display: flex; flex-direction: column;
            -webkit-tap-highlight-color: transparent;
        }

        /* ─── LOGO ─── */
        .logo-text {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.3rem; font-weight: 900;
            letter-spacing: -0.06em; line-height: 1;
            display: flex; align-items: baseline;
        }
        .logo-text .main { color: #f8fafc; }
        .logo-text .sub  { color: var(--t); font-style: italic; }
        .logo-text .dot  { color: #fbbf24; }

        /* ─── TOP BAR ─── */
        .topbar {
            background: rgba(13,21,38,0.92); backdrop-filter: blur(24px) saturate(160%);
            border-bottom: 1px solid var(--border);
            z-index: 200; flex-shrink: 0;
        }

        /* ─── STADIUM TABS ─── */
        .stadium-scroll {
            display: flex; gap: 6px; overflow-x: auto;
            padding: 8px 16px; scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .stadium-scroll::-webkit-scrollbar { display: none; }

        .stadium-pill {
            flex-shrink: 0; padding: 6px 14px;
            border-radius: 99px; font-size: 11px; font-weight: 700;
            background: rgba(255,255,255,0.05); color: #64748b;
            border: 1px solid var(--border); cursor: pointer;
            transition: all 0.2s; white-space: nowrap;
        }
        .stadium-pill.active {
            background: var(--t); color: white; border-color: transparent;
            box-shadow: 0 4px 12px rgba(var(--t-rgb), 0.4);
        }

        /* ─── CATEGORY TABS ─── */
        .cat-bar {
            display: flex; gap: 6px; padding: 8px 16px;
            overflow-x: auto; scrollbar-width: none; flex-shrink: 0;
        }
        .cat-bar::-webkit-scrollbar { display: none; }

        .cat-btn {
            flex-shrink: 0; display: flex; align-items: center; gap: 6px;
            padding: 7px 14px; border-radius: 12px; font-size: 11px; font-weight: 700;
            border: 1px solid var(--border); background: rgba(255,255,255,0.04);
            color: #64748b; cursor: pointer; transition: all 0.2s;
        }
        .cat-btn.active-FOOD   { background: rgba(234,88,12,0.15);  color: #fb923c; border-color: rgba(234,88,12,0.3); }
        .cat-btn.active-STORE  { background: rgba(22,163,74,0.12);  color: #4ade80; border-color: rgba(22,163,74,0.3); }
        .cat-btn.active-BATH   { background: rgba(37,99,235,0.12);  color: #60a5fa; border-color: rgba(37,99,235,0.3); }
        .cat-btn.active-GOODS  { background: rgba(var(--t-rgb),0.15); color: var(--t); border-color: rgba(var(--t-rgb),0.3); }

        /* ─── MAP CONTAINER ─── */
        #map_wrap {
            flex: 1; position: relative; overflow: hidden;
        }
        #map { width: 100%; height: 100%; }

        /* ─── NAV BUTTON (floating) ─── */
        .fab {
            position: absolute; right: 16px;
            width: 48px; height: 48px; border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            cursor: pointer; transition: all 0.2s; z-index: 50;
            border: none;
        }
        .fab:active { transform: scale(0.95); }
        #fab_locate { bottom: 340px; background: #1e293b; border: 1px solid var(--border); color: #94a3b8; }
        #fab_nav    { bottom: 284px; background: var(--t); color: white; }

        /* ─── BOTTOM SHEET ─── */
        #bottom_sheet {
            position: absolute; bottom: 0; left: 0; right: 0; z-index: 150;
            background: rgba(13,21,38,0.97);
            backdrop-filter: blur(28px) saturate(160%);
            border-radius: 24px 24px 0 0;
            border-top: 1px solid rgba(255,255,255,0.12);
            transform: translateY(100%);
            transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
            max-height: 70vh; overflow-y: auto;
            box-shadow: 0 -24px 64px rgba(0,0,0,0.6);
        }
        #bottom_sheet.open { transform: translateY(0); }

        .sheet-handle {
            width: 40px; height: 4px; background: rgba(255,255,255,0.15);
            border-radius: 99px; margin: 12px auto 0;
        }

        /* Crowd meter */
        .crowd-bar {
            height: 8px; background: rgba(255,255,255,0.06);
            border-radius: 99px; overflow: hidden; margin-top: 6px;
        }
        .crowd-fill {
            height: 100%; border-radius: 99px; transition: width 0.8s ease;
        }

        /* Vote buttons */
        .vote-btn {
            flex: 1; padding: 8px 0; border-radius: 10px;
            font-size: 11px; font-weight: 800; cursor: pointer;
            border: 1px solid var(--border); background: rgba(255,255,255,0.04);
            color: #64748b; transition: all 0.2s;
        }
        .vote-btn:hover { background: rgba(255,255,255,0.08); color: #e2e8f0; }
        .vote-btn.voted-low  { background: rgba(34,197,94,0.15);  color: #4ade80; border-color: rgba(34,197,94,0.3); }
        .vote-btn.voted-mid  { background: rgba(251,191,36,0.12); color: #fbbf24; border-color: rgba(251,191,36,0.3); }
        .vote-btn.voted-high { background: rgba(239,68,68,0.12);  color: #f87171; border-color: rgba(239,68,68,0.3); }

        /* ─── CUSTOM MARKERS ─── */
        .mk { width: 28px; height: 28px; border-radius: 50% 50% 50% 0; transform: rotate(-45deg);
              display: flex; align-items: center; justify-content: center;
              border: 2px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.5); cursor: pointer;
              transition: transform 0.2s; }
        .mk:hover { transform: rotate(-45deg) scale(1.2); }
        .mk-inner { transform: rotate(45deg); font-size: 11px; font-weight: 900; color: white; }
        .mk-FOOD  { background: #ea580c; }
        .mk-STORE { background: #16a34a; }
        .mk-BATH  { background: #2563eb; }
        .mk-GOODS { background: var(--t); }

        /* ─── BOTTOM NAV ─── */
        .bottom-nav {
            background: rgba(10,14,26,0.95); backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            display: flex; flex-shrink: 0;
            padding-bottom: env(safe-area-inset-bottom);
        }
        .bnav-item {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 10px 4px 8px; gap: 4px;
            font-size: 9px; font-weight: 700; color: #475569;
            cursor: pointer; transition: all 0.2s;
            text-transform: uppercase; letter-spacing: 0.04em;
            border: none; background: transparent;
        }
        .bnav-item.active { color: var(--t); }

        /* ─── NAV CTA (full width) ─── */
        .nav-cta {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            padding: 14px; border-radius: 14px; font-size: 13px; font-weight: 900;
            cursor: pointer; transition: all 0.2s; border: none;
            background: var(--t); color: white;
            box-shadow: 0 6px 20px rgba(var(--t-rgb), 0.35);
        }
        .nav-cta:active { transform: scale(0.98); }
        .nav-cta.secondary {
            background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: #94a3b8;
            box-shadow: none;
        }

        /* ─── LEGEND ─── */
        .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
    </style>
</head>
<body>

    <!-- ══ TOP BAR ══ -->
    <header class="topbar">
        <div class="flex items-center justify-between px-4 py-2.5">
            <div onclick="location.href='index.html'" class="logo-text cursor-pointer">

                    <span>구장 길찾기</span>
                </button>

            </div>
        </div>

        <!-- Stadium pills -->
        <div class="stadium-scroll">
            <button id="pill-jamsil"   onclick="changeStadium('jamsil')"   class="stadium-pill active">잠실</button>
            <button id="pill-gocheok"  onclick="changeStadium('gocheok')"  class="stadium-pill">고척 스카이돔</button>
            <button id="pill-incheon"  onclick="changeStadium('incheon')"  class="stadium-pill">SSG 랜더스필드</button>
            <button id="pill-suwon"    onclick="changeStadium('suwon')"    class="stadium-pill">수원 KT 위즈파크</button>
            <button id="pill-gwangju"  onclick="changeStadium('gwangju')"  class="stadium-pill">광주 챔피언스필드</button>
            <button id="pill-daegu"    onclick="changeStadium('daegu')"    class="stadium-pill">대구 라이온즈파크</button>
            <button id="pill-sajik"    onclick="changeStadium('sajik')"    class="stadium-pill">사직 야구장</button>
            <button id="pill-changwon" onclick="changeStadium('changwon')" class="stadium-pill">창원 NC파크</button>
            <button id="pill-daejeon"  onclick="changeStadium('daejeon')"  class="stadium-pill">대전 이글스파크</button>
        </div>

        <!-- Category tabs -->
        <div class="cat-bar">
            <button id="cat-FOOD"  onclick="setCategory('FOOD')"  class="cat-btn">
                <i data-lucide="utensils" class="w-3.5 h-3.5"></i> 음식점
            </button>
            <button id="cat-STORE" onclick="setCategory('STORE')" class="cat-btn">
                <i data-lucide="store" class="w-3.5 h-3.5"></i> 편의점
            </button>
            <button id="cat-BATH"  onclick="setCategory('BATH')"  class="cat-btn">
                <i data-lucide="droplets" class="w-3.5 h-3.5"></i> 화장실
            </button>
            <button id="cat-GOODS" onclick="setCategory('GOODS')" class="cat-btn">
                <i data-lucide="shopping-bag" class="w-3.5 h-3.5"></i> 팀 스토어
            </button>
            <!-- Legend -->
            <div class="flex items-center gap-3 ml-auto pl-4 shrink-0">
                <div class="flex items-center gap-1"><div class="legend-dot bg-orange-500"></div><span class="text-[9px] text-slate-500">음식</span></div>
                <div class="flex items-center gap-1"><div class="legend-dot bg-green-600"></div><span class="text-[9px] text-slate-500">편의점</span></div>
                <div class="flex items-center gap-1"><div class="legend-dot bg-blue-600"></div><span class="text-[9px] text-slate-500">화장실</span></div>
                <div class="flex items-center gap-1"><div class="legend-dot" style="background:var(--t)"></div><span class="text-[9px] text-slate-500">스토어</span></div>
            </div>
        </div>
    </header>

    <!-- ══ MAP ══ -->
    <div id="map_wrap">
        <div id="map"></div>

        <!-- FAB buttons -->
        <button class="fab" id="fab_locate" onclick="locateMe()" title="내 위치">
            <i data-lucide="locate" class="w-5 h-5"></i>
        </button>
        <button class="fab" id="fab_nav" onclick="navToSelected()" title="길찾기">
            <i data-lucide="navigation-2" class="w-5 h-5"></i>
        </button>

        <!-- Bottom Sheet -->
        <div id="bottom_sheet">
            <div class="sheet-handle"></div>
            <div class="px-5 pt-3 pb-6">

                <!-- Header -->
                <div class="flex items-start justify-between mb-4">
                    <div class="flex items-center gap-3">
                        <div id="bs_cat_icon" class="w-10 h-10 rounded-xl flex items-center justify-center shrink-0 bg-orange-500/15">
                            <i data-lucide="utensils" class="w-5 h-5 text-orange-400"></i>
                        </div>
                        <div>
                            <h3 id="bs_name" class="text-lg font-black text-white">시설 이름</h3>
                            <p id="bs_cat_label" class="text-xs font-semibold text-slate-500">카테고리</p>
                        </div>
                    </div>
                    <button onclick="closeSheet()" class="w-8 h-8 rounded-full bg-white/5 flex items-center justify-center">
                        <i data-lucide="x" class="w-4 h-4 text-slate-400"></i>
                    </button>
                </div>

                <!-- Location desc -->
                <div class="flex items-start gap-2 mb-4 p-3 rounded-xl bg-white/3 border border-[var(--border)]">
                    <i data-lucide="map-pin" class="w-4 h-4 text-slate-400 mt-0.5 shrink-0"></i>
                    <p id="bs_loc" class="text-xs text-slate-300 leading-relaxed font-medium">위치 정보를 불러오는 중...</p>
                </div>

                <!-- Crowd meter -->
                <div class="mb-4">
                    <div class="flex items-center justify-between mb-2">
                        <p class="text-[10px] font-black text-slate-500 uppercase tracking-wider">현재 혼잡도</p>
                        <span id="bs_crowd_label" class="text-xs font-black text-amber-400">보통</span>
                    </div>
                    <div class="crowd-bar">
                        <div id="bs_crowd_bar" class="crowd-fill bg-amber-400" style="width: 55%"></div>
                    </div>
                    <!-- Vote -->
                    <p class="text-[10px] text-slate-600 font-medium mt-2 mb-2">직접 혼잡도를 알려주세요 👇</p>
                    <div class="flex gap-2">
                        <button class="vote-btn" onclick="vote('low')"  id="vbtn-low">🟢 여유</button>
                        <button class="vote-btn" onclick="vote('mid')"  id="vbtn-mid">🟡 보통</button>
                        <button class="vote-btn" onclick="vote('high')" id="vbtn-high">🔴 혼잡</button>
                    </div>
                </div>

                <!-- Nav buttons -->
                <div class="flex gap-3">
                    <button class="nav-cta flex-1" onclick="navToSelected()">
                        <i data-lucide="navigation-2" class="w-4 h-4"></i>
                        여기로 길찾기
                    </button>
                    <button class="nav-cta secondary" onclick="kakaoNavToSelected()" style="width:48px; padding:0; flex-shrink:0;">
                        <i data-lucide="external-link" class="w-4 h-4"></i>
                    </button>
                </div>

                <!-- Nearby hint -->
                <p id="bs_nearby" class="text-[10px] text-slate-600 font-medium mt-3 text-center hidden"></p>
            </div>
        </div>
    </div>

    <!-- ══ BOTTOM NAV ══ -->
    <nav class="bottom-nav">
        <button class="bnav-item" onclick="location.href='index.html'">
            <i data-lucide="radio" class="w-5 h-5"></i> 라이브
        </button>
        <button class="bnav-item active">
            <i data-lucide="map" class="w-5 h-5"></i> 지도
        </button>
        <button class="bnav-item" onclick="location.href='guide.html'">
            <i data-lucide="book-open" class="w-5 h-5"></i> 가이드
        </button>
        <button class="bnav-item" onclick="location.href='diary.html'">
            <i data-lucide="calendar-heart" class="w-5 h-5"></i> 다이어리
        </button>
        <button class="bnav-item" onclick="location.href='community.html'">
            <i data-lucide="messages-square" class="w-5 h-5"></i> 커뮤니티
        </button>
    </nav>

<script>
/* ── THEME ── */
(function() {
    try {
        const u = JSON.parse(localStorage.getItem('curr') || 'null');
        if (u?.color) {
            document.documentElement.style.setProperty('--t', u.color);
            const r = parseInt(u.color.slice(1,3),16);
            const g = parseInt(u.color.slice(3,5),16);
            const b = parseInt(u.color.slice(5,7),16);
            document.documentElement.style.setProperty('--t-rgb', `${r},${g},${b}`);
            const circ = document.getElementById('u_circle');
            if (circ) {
                circ.textContent = u.nick.charAt(0).toUpperCase();
                circ.style.background = u.color;
            }
        }
    } catch(e) {}
})();

lucide.createIcons();

    gocheok: [
        { name:"고척 공식 굿즈샵", lat:37.49820, lng:126.86700, cat:"GOODS", loc:"돔 구장 메인 게이트 입장 직후 정면", crowd:60 },
        { name:"GS25 고척점", lat:37.49840, lng:126.86720, cat:"STORE", loc:"1번 게이트 우측", crowd:40 },
    ],
    incheon: [],
    suwon: [],
    gwangju: [],
    daegu: [],
    sajik: [],
    changwon: [],
    daejeon: []
};

const stadiumNames = {
    jamsil:'잠실 야구장', gocheok:'고척 스카이돔', incheon:'SSG 랜더스필드',
    suwon:'수원 KT 위즈파크', gwangju:'광주 챔피언스필드', daegu:'대구 라이온즈파크',
    sajik:'사직 야구장', changwon:'창원 NC파크', daejeon:'대전 이글스파크'
};

const catMeta = {
    FOOD:  { label:'음식점', icon:'utensils',    color:'#ea580c', iconColor:'text-orange-400', bg:'bg-orange-500/15' },
    STORE: { label:'편의점', icon:'store',        color:'#16a34a', iconColor:'text-green-400',  bg:'bg-green-500/12' },
    BATH:  { label:'화장실', icon:'droplets',     color:'#2563eb', iconColor:'text-blue-400',   bg:'bg-blue-500/12' },
    GOODS: { label:'팀 스토어', icon:'shopping-bag', color:'var(--t)', iconColor:'text-team',  bg:'bg-team/15' },
};

/* ── STATE ── */
let map, currentStadiumId = 'jamsil', currentCategory = 'FOOD';
let activeOverlays = [], selectedFacility = null, userLatLng = null;
let voteState = {};

/* ── KAKAO MAP INIT ── */
const stadiumCoords = {};
kakao.maps.load(function() {
    const coords = {
        jamsil:   [37.5122, 127.0719], gocheok: [37.4982, 126.8670],
        incheon:  [37.4370, 126.6933], suwon:   [37.2997, 127.0097],
        gwangju:  [35.1681, 126.8848], daegu:   [35.8412, 128.6818],
        sajik:    [35.1940, 129.0615], changwon:[35.2224, 128.5823],
        daejeon:  [36.3171, 127.4292]
    };
    for (const [k,[lat,lng]] of Object.entries(coords)) {
        stadiumCoords[k] = new kakao.maps.LatLng(lat, lng);
    }

    const container = document.getElementById('map');
    map = new kakao.maps.Map(container, {
        center: stadiumCoords.jamsil,
        level: 3
    });

    // Tap map → close sheet
    kakao.maps.event.addListener(map, 'click', () => closeSheet());

    // Initial render
    setCategory('FOOD');
});

/* ── STADIUM CHANGE ── */
function changeStadium(id) {
    if (!map) return;
    currentStadiumId = id;
    map.panTo(stadiumCoords[id]);

    document.querySelectorAll('.stadium-pill').forEach(p => p.classList.remove('active'));
    document.getElementById('pill-' + id)?.classList.add('active');

    clearOverlays();
    renderMarkers();
    closeSheet();
}

/* ── CATEGORY ── */
function setCategory(cat) {
    currentCategory = cat;

    document.querySelectorAll('.cat-btn').forEach(b => {
        b.className = b.className.replace(/active-\w+/, '').trim();
    });
    document.getElementById('cat-' + cat)?.classList.add('active-' + cat);

    clearOverlays();
    renderMarkers();
    closeSheet();
}

/* ── MARKERS ── */
function clearOverlays() {
    activeOverlays.forEach(o => o.setMap(null));
    activeOverlays = [];
}

function renderMarkers() {
    if (!map) return;
    const list = (facilityData[currentStadiumId] || []).filter(f => f.cat === currentCategory);

    list.forEach(f => {
        const el = document.createElement('div');
        el.className = `mk mk-${f.cat}`;
        el.innerHTML = `<span class="mk-inner">${f.name.charAt(0)}</span>`;
        el.addEventListener('click', (e) => {
            e.stopPropagation();
            openSheet(f);
        });

        const overlay = new kakao.maps.CustomOverlay({
            position: new kakao.maps.LatLng(f.lat, f.lng),
            content: el,
            yAnchor: 1.15,
            xAnchor: 0.5
        });
        overlay.setMap(map);
        activeOverlays.push(overlay);
    });
}

/* ── BOTTOM SHEET ── */
function openSheet(f) {
    selectedFacility = f;
    const meta = catMeta[f.cat];

    document.getElementById('bs_name').textContent = f.name;
    document.getElementById('bs_cat_label').textContent = meta.label;
    document.getElementById('bs_loc').textContent = f.loc || '위치 정보 없음';

    // Cat icon
    const iconWrap = document.getElementById('bs_cat_icon');
    iconWrap.className = `w-10 h-10 rounded-xl flex items-center justify-center shrink-0 ${meta.bg}`;
    iconWrap.innerHTML = `<i data-lucide="${meta.icon}" class="w-5 h-5 ${meta.iconColor}"></i>`;

    // Crowd
    updateCrowdUI(f.crowd);

    // Reset votes
    ['low','mid','high'].forEach(v => {
        document.getElementById('vbtn-' + v).className = 'vote-btn';
    });
    const savedVote = voteState[f.name];
    if (savedVote) document.getElementById('vbtn-' + savedVote)?.classList.add('voted-' + savedVote);

    document.getElementById('bottom_sheet').classList.add('open');
    lucide.createIcons();
}

function closeSheet() {
    document.getElementById('bottom_sheet').classList.remove('open');
    selectedFacility = null;
}

function updateCrowdUI(pct) {
    const bar = document.getElementById('bs_crowd_bar');
    const label = document.getElementById('bs_crowd_label');
    bar.style.width = pct + '%';

    if (pct < 40) {
        bar.className = 'crowd-fill bg-green-400';
        label.textContent = '여유 (' + pct + '%)';
        label.className = 'text-xs font-black text-green-400';
    } else if (pct < 70) {
        bar.className = 'crowd-fill bg-amber-400';
        label.textContent = '보통 (' + pct + '%)';
        label.className = 'text-xs font-black text-amber-400';
    } else {
        bar.className = 'crowd-fill bg-red-400';
        label.textContent = '혼잡 (' + pct + '%)';
        label.className = 'text-xs font-black text-red-400';
    }
}

function vote(level) {
    if (!selectedFacility) return;
    voteState[selectedFacility.name] = level;

    ['low','mid','high'].forEach(v => {
        document.getElementById('vbtn-' + v).className = 'vote-btn';
    });
    document.getElementById('vbtn-' + level)?.classList.add('voted-' + level);

    // Update crowd visual based on vote
    const pctMap = { low: 25, mid: 55, high: 85 };
    selectedFacility.crowd = pctMap[level];
    updateCrowdUI(selectedFacility.crowd);
}

/* ── NAVIGATION ── */
function navToSelected() {
    if (!selectedFacility) {
        startNavToStadium();
        return;
    }
    const { name, lat, lng } = selectedFacility;
    window.open(`https://map.kakao.com/link/to/${name},${lat},${lng}`, '_blank');
}

function kakaoNavToSelected() {
    navToSelected();
}

function startNavToStadium() {
    const coord = stadiumCoords[currentStadiumId];
    if (!coord) return;
    const name = stadiumNames[currentStadiumId];
    window.open(`https://map.kakao.com/link/to/${name},${coord.getLat()},${coord.getLng()}`, '_blank');
}

function locateMe() {
    if (!navigator.geolocation) { alert('위치 서비스를 지원하지 않습니다.'); return; }
    navigator.geolocation.getCurrentPosition(pos => {
        userLatLng = new kakao.maps.LatLng(pos.coords.latitude, pos.coords.longitude);
        map.panTo(userLatLng);

        // Place user marker
        const el = document.createElement('div');
        el.style.cssText = `
            width:16px;height:16px;border-radius:50%;
            background:var(--t);border:3px solid white;
            box-shadow:0 0 0 4px rgba(var(--t-rgb),0.3);
        `;
        new kakao.maps.CustomOverlay({
            position: userLatLng, content: el,
            yAnchor: 0.5, xAnchor: 0.5
        }).setMap(map);
    }, () => alert('위치 정보를 가져올 수 없습니다.'));
}
</script>
</body>
</html>
