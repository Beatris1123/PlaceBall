# ════════════════════════════════════════
#  MYSQL 프로파일 — 로컬/서버 MariaDB/MySQL
#  실행: ./gradlew bootRun  (기본 프로파일)
#  또는: java -jar placeball.jar --spring.profiles.active=mysql
# ════════════════════════════════════════

# MariaDB 연결
spring.datasource.url=jdbc:mysql://localhost:3306/placeball_db?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=placeball
spring.datasource.password=Placeball2026!

# H2 콘솔 비활성화
spring.h2.console.enabled=false

# DDL: update (테이블 없으면 자동 생성, 있으면 유지)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# 로그 레벨
logging.level.com.example.CapStoneDesign=DEBUG
logging.level.org.springframework.security=WARN
