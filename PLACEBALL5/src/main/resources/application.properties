# ════════════════════════════════════════
#  공통 설정 (모든 프로파일에서 공유)
# ════════════════════════════════════════
spring.application.name=PLACEBALL

# 기본 실행 프로파일 → dev (H2)
# 운영 배포 시에는 --spring.profiles.active=prod 로 실행
spring.profiles.active=dev

# JPA 공통
spring.jpa.open-in-view=false

# JWT 시크릿 키 (최소 32자 이상 Base64 인코딩 권장)
# 운영 시에는 환경변수로 주입:  JWT_SECRET=xxxxx
jwt.secret=cGxhY2ViYWxsLXN1cGVyLXNlY3JldC1rZXktZm9yLWp3dC0yMDI2
jwt.expiration-ms=86400000
