# ════════════════════════════════════════
#  공통 설정 (모든 프로파일에서 공유)
# ════════════════════════════════════════
spring.application.name=PLACEBALL

# 기본 실행 프로파일 → mysql (로컬 MariaDB/MySQL 영구 저장)
# H2 개발 시: --spring.profiles.active=dev
spring.profiles.active=mysql

# JPA 공통
spring.jpa.open-in-view=false

# JWT 시크릿 키 (최소 32자 이상 Base64 인코딩 권장)
# 운영 시에는 환경변수로 주입:  JWT_SECRET=xxxxx
jwt.secret=cGxhY2ViYWxsLXN1cGVyLXNlY3JldC1rZXktZm9yLWp3dC0yMDI2
jwt.expiration-ms=86400000

# ════════════════════════════════════════
#  기상청 단기예보 API (data.go.kr)
#  발급: https://www.data.go.kr → "기상청_단기예보 조회서비스" 신청
#  실제 키 발급 후 아래 값 대체 또는 환경변수로 주입
#  export WEATHER_API_KEY=여기에_발급받은_키
# ════════════════════════════════════════
weather.api.key=${WEATHER_API_KEY:}
